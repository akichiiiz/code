<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hidden Clue</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
    }

    h1 {
      opacity: 0.9;
    }

    /* CLUE DISIMPAN DI SINI (INSPECTOR ONLY) */
    /* keyword: #79b4b4 */

    /* Trick tambahan: warna hampir sama background */
    .hidden-clue {
      color: #0f172a; /* sama seperti background → invisible */
      user-select: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Nothing here...</h1>
  <p>Coba cari sesuatu 👀</p>

  <!-- CLUE RAHASIA -->
  <!-- #79b4b4 -->

  <p class="hidden-clue">#79b4b4</p>
</div>

<script>
  // clue tambahan via console
  console.log("clue: #79b4b4");

  // anti casual user (optional)
  document.addEventListener('contextmenu', event => event.preventDefault());
</script>

</body>
</html>
